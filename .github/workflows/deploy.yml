name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── API (Cloudflare Worker) ───────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Install only the apps/api workspace (+ its workspace deps) and the root.
      # Skips apps/web's Next.js/React/OpenNext tree, which is irrelevant for the
      # API deploy and was the main reason the previous full install took ~4m+.
      - name: Install dependencies (api workspace only)
        run: npm ci --workspace=apps/api --include-workspace-root --no-audit --no-fund --prefer-offline

      - name: Deploy API Worker
        run: npx --no-install wrangler deploy
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  # ── Web app (OpenNext → Cloudflare Worker) ────────────────────────────────────
  deploy-web:
    name: Deploy Web
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Scope to apps/web (+ its workspace deps + root). Skips apps/api tree.
      - name: Install dependencies (web workspace only)
        run: npm ci --workspace=apps/web --include-workspace-root --no-audit --no-fund --prefer-offline

      - name: Install Linux native bindings
        run: npm install --no-save --no-audit --no-fund @ast-grep/napi-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

      - name: Copy pdfjs worker to public
        run: cp apps/web/node_modules/pdfjs-dist/build/pdf.worker.min.mjs apps/web/public/pdf.worker.min.mjs

      - name: Build web app (OpenNext)
        run: cd apps/web && npm run cf:build

      - name: Deploy Web Worker
        run: npx wrangler deploy
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: SEO smoke monitoring (post-deploy)
        run: node scripts/seo-monitoring-check.mjs --base-url=https://ilbuoncaffe.pl --strict --output=.artifacts/seo-monitoring-postdeploy.json

      - name: Upload SEO smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-monitoring-postdeploy
          path: .artifacts/seo-monitoring-postdeploy.json
